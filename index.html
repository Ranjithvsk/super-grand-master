<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Grand Master — Chess Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans',sans-serif;background:#161512;color:#bababa;overflow-x:hidden}

/* TOP NAV - exact lichess */
#top{height:44px;background:#2b2825;display:flex;align-items:center;padding:0 8px;position:relative;z-index:10}
#top .site-title{display:flex;align-items:center;gap:6px;padding:0 8px;cursor:pointer}
#top .site-title span{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
#top .site-buttons{display:flex;margin-left:auto;gap:2px}
#top .site-buttons a{padding:8px 14px;color:#999;font-size:14px;font-weight:600;cursor:pointer;border-radius:3px;text-decoration:none;border:none;background:none}
#top .site-buttons a:hover{color:#fff;background:rgba(255,255,255,.07)}
#top .site-buttons a.active{color:#ddd;background:rgba(255,255,255,.1)}

/* PUZZLE LAYOUT - exact lichess */
.puzzle{display:flex;justify-content:center;padding:0}
.puzzle__board{position:relative}
.puzzle__board .cg-wrap{width:min(calc(100vh - 120px), 640px);aspect-ratio:1;position:relative}

/* BOARD */
.cg-wrap{display:grid;grid-template-columns:repeat(8,12.5%);grid-template-rows:repeat(8,12.5%);user-select:none;-webkit-user-select:none;touch-action:none;border-radius:0}
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Lichess brown board colors */
.sq.light{background:#f0d9b5}
.sq.dark{background:#b58863}
.sq.light.lastmove{background:#cdd26a}
.sq.dark.lastmove{background:#aaa23b}
.sq.light.selected{background:#819669}
.sq.dark.selected{background:#646d40}
.sq.light.check{background:radial-gradient(ellipse at center,rgba(255,0,0,.9) 0%,rgba(231,0,0,.65) 25%,rgba(169,0,0,0) 89%),#f0d9b5}
.sq.dark.check{background:radial-gradient(ellipse at center,rgba(255,0,0,.9) 0%,rgba(231,0,0,.65) 25%,rgba(169,0,0,0) 89%),#b58863}

/* Piece images - actual Lichess SVGs */
.sq .piece-img{width:100%;height:100%;position:absolute;top:0;left:0;background-size:cover;background-repeat:no-repeat;pointer-events:none;z-index:2}

/* Move hints - lichess green dots */
.sq .move-dot{position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(20,85,30,.5);z-index:3}
.sq .capture-ring{position:absolute;width:100%;height:100%;border-radius:50%;z-index:3}
.sq .capture-ring::after{content:'';position:absolute;top:3%;left:3%;right:3%;bottom:3%;border-radius:50%;border:calc(min(calc(100vh - 120px),640px)*0.01) solid rgba(20,85,30,.5)}

/* Coordinates - lichess style */
.sq .coord{position:absolute;font-size:calc(min(calc(100vh - 120px),640px) * .017);font-weight:700;pointer-events:none;z-index:4;font-family:'Noto Sans',sans-serif}
.sq .coord-file{bottom:1px;right:3px}
.sq .coord-rank{top:1px;left:3px}
.sq.light .coord{color:#b58863}
.sq.dark .coord{color:#f0d9b5}

/* SIDEBAR - exact lichess */
.puzzle__side{width:280px;display:flex;flex-direction:column;background:#262421}

/* Move list */
.puzzle__moves{flex:1;overflow-y:auto;padding:0}
.puzzle__moves table{width:100%;border-collapse:collapse}
.puzzle__moves td{padding:5px 8px;font-size:15px;font-family:'Noto Sans',sans-serif}
.puzzle__moves .index{color:#666;width:28px;text-align:right;padding-right:4px}
.puzzle__moves .move{color:#bababa;cursor:pointer;border-radius:2px}
.puzzle__moves .move:hover{background:rgba(255,255,255,.07)}
.puzzle__moves .move.active{background:#3692e7;color:#fff}

/* Prompt area */
.puzzle__feedback{padding:24px 20px;text-align:center}
.puzzle__feedback .icon{margin-bottom:8px}
.puzzle__feedback .icon img{width:52px;height:52px;opacity:.7}
.puzzle__feedback .result{font-size:22px;font-weight:700;color:#ccc;margin-bottom:2px}
.puzzle__feedback .instruction{font-size:15px;color:#999;margin-bottom:16px}
.puzzle__feedback .actions{display:flex;flex-direction:column;gap:0}
.puzzle__feedback .actions a{display:block;padding:12px;text-align:center;color:#3692e7;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;text-decoration:none;border:none;background:none}
.puzzle__feedback .actions a:hover{background:rgba(54,146,231,.08)}
.puzzle__feedback.success .result{color:#629924}
.puzzle__feedback.failure .result{color:#cc3333}
.puzzle__feedback.retry .result{color:#cc3333}

/* Continue button */
.puzzle__feedback .continue-btn{display:block;padding:14px;text-align:center;background:#629924;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:3px;cursor:pointer;margin:8px 16px;text-transform:uppercase}
.puzzle__feedback .continue-btn:hover{background:#72b328}

/* Bottom bar */
.puzzle__info{padding:12px 16px;border-top:1px solid #333;display:flex;align-items:center;justify-content:space-between}
.puzzle__info .details{font-size:13px;color:#999}
.puzzle__info .details a{color:#3692e7;text-decoration:none}
.puzzle__info .details a:hover{text-decoration:underline}
.puzzle__info .details b{color:#ccc}
.puzzle__info .nav-arrows{display:flex;gap:3px}
.puzzle__info .nav-arrows button{width:34px;height:34px;background:#302e2b;border:none;color:#999;font-size:14px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:serif}
.puzzle__info .nav-arrows button:hover{background:#3a3835;color:#fff}

/* PLAY VIEW */
.play-page{max-width:840px;margin:0 auto;padding:20px 12px}
.play-ctrls{display:flex;gap:12px;align-items:flex-end;margin-bottom:16px}
.play-ctrls .fg{flex:1}
.play-ctrls label{display:block;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600}
.play-ctrls select{width:100%;padding:8px;background:#302e2b;color:#bababa;border:1px solid #3a3632;border-radius:3px;font-size:14px;font-family:'Noto Sans',sans-serif}
.play-btn{padding:10px 24px;background:#629924;color:#fff;border:none;border-radius:3px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans',sans-serif}
.play-btn:hover{background:#72b328}
.g-status{text-align:center;padding:12px;font-size:16px;font-weight:600;color:#ccc;background:#262421;border-radius:4px;margin-bottom:12px}
.g-board-wrap{display:flex;justify-content:center}
.g-board{width:min(calc(100vh - 200px),520px);aspect-ratio:1;display:grid;grid-template-columns:repeat(8,12.5%);grid-template-rows:repeat(8,12.5%);border-radius:4px;overflow:hidden;user-select:none}
.g-moves{margin-top:12px;padding:12px;background:#262421;border-radius:4px;font-family:monospace;font-size:13px;color:#999;min-height:50px;max-height:120px;overflow-y:auto;line-height:1.8}

/* STATS VIEW */
.stats-page{max-width:500px;margin:0 auto;padding:30px 12px}
.stats-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:20px;text-align:center}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{padding:24px;background:#262421;border-radius:4px;text-align:center}
.stat-card .num{font-size:36px;font-weight:800;color:#629924}
.stat-card .lbl{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* Promo modal */
.promo-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.promo-choices{display:flex;gap:4px;background:#302e2b;padding:12px;border-radius:6px;border:2px solid #629924}
.promo-choice{width:64px;height:64px;cursor:pointer;border-radius:4px;background-size:cover;border:1px solid #3a3632}
.promo-choice:hover{border-color:#629924;transform:scale(1.08)}

.hidden{display:none!important}

@media(max-width:768px){
  .puzzle{flex-direction:column;align-items:center}
  .puzzle__board .cg-wrap{width:min(96vw,500px)}
  .puzzle__side{width:min(96vw,500px)}
}

#auth-overlay{position:fixed;inset:0;background:#161512;z-index:9999;display:flex;align-items:center;justify-content:center}
#auth-box{background:#262421;border-radius:8px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#auth-box .logo{font-size:40px;margin-bottom:8px}
#auth-box h2{color:#fff;font-size:22px;margin-bottom:4px;font-weight:800}
#auth-box .sub{color:#666;font-size:13px;margin-bottom:24px}
#auth-box input{width:100%;padding:11px 14px;margin-bottom:10px;background:#302e2b;border:1px solid #3a3632;border-radius:4px;color:#fff;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box}
#auth-box input:focus{border-color:#3692e7}
#auth-box .btn-email{width:100%;padding:12px;background:#629924;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px}
#auth-box .btn-email:hover{background:#72b328}
#auth-box .btn-google{width:100%;padding:11px;background:#fff;color:#333;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;box-sizing:border-box}
#auth-box .btn-google:hover{background:#f0f0f0}
#auth-box .divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:#555;font-size:12px}
#auth-box .divider::before,#auth-box .divider::after{content:'';flex:1;height:1px;background:#3a3632}
#auth-box .err{color:#e74c3c;font-size:13px;margin-bottom:8px;min-height:18px}
#auth-box .toggle{color:#3692e7;font-size:13px;cursor:pointer;margin-top:12px;display:inline-block}
#auth-box .toggle:hover{text-decoration:underline}
#user-badge{display:none;align-items:center;gap:8px;margin-left:auto}
#user-badge .av{width:28px;height:28px;border-radius:50%;background:#629924;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;overflow:hidden;flex-shrink:0}
#user-badge .av img{width:100%;height:100%;object-fit:cover}
#user-badge .uname{color:#ddd;font-size:13px;font-weight:600}
#user-badge .abadge{background:#629924;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase}
#btn-out{padding:5px 10px;background:none;border:1px solid #3a3632;border-radius:3px;color:#999;font-size:12px;cursor:pointer;font-family:inherit}
#btn-out:hover{background:#302e2b;color:#fff}

</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script></head>

<!-- TOP NAV -->
<header id="top">
  <div class="site-title">
    <span style="font-size:26px;color:#b3b3b3">&#9822;</span>
    <span>Super Grand Master</span>
  </div>
  <div class="site-buttons">
    <a class="active" onclick="switchView('puzzles')">PUZZLES</a>
    <a onclick="switchView('play')">PLAY</a>
    <a onclick="switchView('stats')">STATS</a>
  </div>
</header>

<!-- PUZZLE VIEW -->
<div class="puzzle" id="v-puzzles">
  <div class="puzzle__board">
    <div class="cg-wrap" id="pboard"></div>
  </div>
  <div class="puzzle__side">
    <div class="puzzle__moves" id="movesList"></div>
    <div class="puzzle__feedback" id="prompt"></div>
    <div class="puzzle__info">
      <div class="details">

        Rating: <b id="pzRat">—</b>
      </div>
      <div class="nav-arrows">
        <button onclick="newPuzzle()" title="Previous">&#9664;&#9664;</button>
        <button onclick="newPuzzle()" title="Back">&#9664;</button>
        <button onclick="newPuzzle()" title="Next">&#9654;</button>
        <button onclick="newPuzzle()" title="Last">&#9654;&#9654;</button>
      </div>
    </div>
  </div>
</div>

<!-- PLAY VIEW -->
<div class="play-page hidden" id="v-play">
  <div class="play-ctrls">
    <div class="fg"><label>Color</label><select id="gcol"><option value="w">White</option><option value="b">Black</option></select></div>
    <div class="fg"><label>Level</label><select id="glvl"><option value="1">Beginner</option><option value="2" selected>Intermediate</option><option value="3">Advanced</option><option value="4">Expert</option></select></div>
    <button class="play-btn" onclick="newGame()">New Game</button>
  </div>
  <div class="g-status" id="gstatus">Click New Game to start</div>
  <div class="g-board-wrap"><div class="g-board" id="gboard"></div></div>
  <div class="g-moves" id="gmoves"></div>
</div>

<!-- STATS VIEW -->
<div class="stats-page hidden" id="v-stats">
  <div class="stats-title">Your Progress</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="xS">0</div><div class="lbl">Solved</div></div>
    <div class="stat-card"><div class="num" id="xA">0%</div><div class="lbl">Accuracy</div></div>
    <div class="stat-card"><div class="num" id="xK">0</div><div class="lbl">Streak</div></div>
    <div class="stat-card"><div class="num" id="xG">0</div><div class="lbl">Games</div></div>
  </div>
</div>

// Map chess.js piece to SVG key
function pieceKey(p){return (p.color==='w'?'w':'b')+p.type.toUpperCase()}

let view='puzzles',chess=null,sel=null,lastMv=null,flipped=false;
let curPz=null,pzIdx=0,pzDone=false;
let gChess=null,pCol='w',eLvl=2,gOn=false;

function switchView(v){
  view=v;
  document.querySelectorAll('.site-buttons a').forEach(a=>{a.classList.toggle('active',a.textContent.toLowerCase()===v)});
  document.getElementById('v-puzzles').classList.toggle('hidden',v!=='puzzles');
  document.getElementById('v-play').classList.toggle('hidden',v!=='play');
  document.getElementById('v-stats').classList.toggle('hidden',v!=='stats');
  if(v==='stats')updStats();
}

// === BOARD ===
function drawBoard(id,ch,fl,canMove,onClick){
  const el=document.getElementById(id);el.innerHTML='';
  const b=ch.board();
  const ksq=ch.in_check()?findKing(ch,ch.turn()):null;
  for(let r=0;r<8;r++){for(let c=0;c<8;c++){
    const rr=fl?7-r:r,cc=fl?7-c:c;
    const f='abcdefgh'[cc],rk=8-rr,sq=f+rk,lt=(rr+cc)%2===0;
    const d=document.createElement('div');
    let cls='sq '+(lt?'light':'dark');
    if(lastMv&&(sq===lastMv.from||sq===lastMv.to))cls+=' lastmove';
    if(sq===sel)cls+=' selected';
    if(sq===ksq)cls+=' check';
    d.className=cls;d.dataset.sq=sq;

    // Coords
    if(c===7){const s=document.createElement('span');s.className='coord coord-rank';s.textContent=rk;d.appendChild(s)}
    if(r===7){const s=document.createElement('span');s.className='coord coord-file';s.textContent=f;d.appendChild(s)}

    // Move hints
    if(sel&&canMove){
      const mvs=ch.moves({square:sel,verbose:true});
      const m=mvs.find(x=>x.to===sq);
      if(m){
        if(m.captured||b[rr][cc]){const h=document.createElement('div');h.className='capture-ring';d.appendChild(h)}
        else{const h=document.createElement('div');h.className='move-dot';d.appendChild(h)}
      }
    }

    // Piece as background image (Lichess SVGs)
    const pc=b[rr][cc];
    if(pc){
      const img=document.createElement('div');
      img.className='piece-img';
      img.style.backgroundImage='url("'+PIECE_SVG[pieceKey(pc)]+'")';
      d.appendChild(img);
    }

    if(canMove){d.onclick=()=>onClick(sq);d.ontouchend=(e)=>{e.preventDefault();onClick(sq)}}
    el.appendChild(d);
  }}
}
function findKing(ch,col){const b=ch.board();for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&p.type==='k'&&p.color===col)return 'abcdefgh'[c]+(8-r)}return null}

// === PUZZLES ===
function newPuzzle(){
  const raw=PUZZLES[Math.floor(Math.random()*PUZZLES.length)];
  const sCh=new Chess(raw[1]);
  const moves=raw[2].split(' ');
  const om=moves[0];
  sCh.move({from:om.slice(0,2),to:om.slice(2,4),promotion:om.length>4?om[4]:undefined});
  curPz={fen:sCh.fen(),sol:moves.slice(1),color:sCh.turn(),rating:raw[3],themes:raw[4],id:raw[0]};
  pzIdx=0;pzDone=false;sel=null;
  chess=new Chess(curPz.fen);
  flipped=curPz.color==='b';
  lastMv={from:om.slice(0,2),to:om.slice(2,4)};
  drawPuzzle();
  document.getElementById('pzLink').textContent='#'+curPz.id;
  document.getElementById('pzLink').href='https://lichess.org/training/'+curPz.id;
  document.getElementById('pzRat').textContent=curPz.rating;
  showPrompt('turn');
}
function drawPuzzle(){drawBoard('pboard',chess,flipped,!pzDone,onPzSq);renderMoves()}
function onPzSq(sq){
  if(pzDone)return;
  if(sel){
    const mvs=chess.moves({square:sel,verbose:true});
    const m=mvs.find(x=>x.to===sq);
    if(m){
      if(m.flags.includes('p')){showPromo(sel,sq,chess.turn(),'pz');return}
      doPzMove(sel,sq);
    }else{const pc=chess.get(sq);sel=(pc&&pc.color===chess.turn())?sq:null;drawPuzzle()}
  }else{const pc=chess.get(sq);if(pc&&pc.color===chess.turn())sel=sq;drawPuzzle()}
}
function doPzMove(fr,to,pr){
  const exp=curPz.sol[pzIdx],uci=fr+to+(pr||'');
  if(uci===exp){
    chess.move({from:fr,to:to,promotion:pr});lastMv={from:fr,to:to};sel=null;pzIdx++;
    if(pzIdx>=curPz.sol.length){pzDone=true;st.s++;st.a++;st.k++;saveSt();showPrompt('success');drawPuzzle();return}
    showPrompt('good');drawPuzzle();
    setTimeout(()=>{
      const op=curPz.sol[pzIdx];chess.move({from:op.slice(0,2),to:op.slice(2,4),promotion:op.length>4?op[4]:undefined});
      lastMv={from:op.slice(0,2),to:op.slice(2,4)};pzIdx++;
      if(pzIdx>=curPz.sol.length){pzDone=true;st.s++;st.a++;st.k++;saveSt();showPrompt('success')}
      else showPrompt('turn');
      drawPuzzle();
    },400);
  }else{st.a++;st.k=0;saveSt();showPrompt('fail');sel=null;drawPuzzle()}
}
function showPrompt(type){
  const el=document.getElementById('prompt');
  const col=curPz?.color==='w'?'white':'black';
  const kingSvg=curPz?.color==='w'?PIECE_SVG.wK:PIECE_SVG.bK;
  if(type==='turn'){
    el.className='puzzle__feedback';
    el.innerHTML='<div class="icon"><img src="'+kingSvg+'" alt=""></div><div class="result">Your turn</div><div class="instruction">Find the best move for '+col+'.</div><div class="actions"><a onclick="pzHint()">GET A HINT</a><a onclick="pzSolution()">VIEW THE SOLUTION</a></div>';
  }else if(type==='good'){
    el.className='puzzle__feedback success';
    el.innerHTML='<div class="result">\u2713 Best move!</div><div class="instruction">Keep going...</div>';
  }else if(type==='success'){
    el.className='puzzle__feedback success';
    el.innerHTML='<div class="result">\u2713 Puzzle complete!</div><button class="continue-btn" onclick="newPuzzle()">CONTINUE \u2192</button>';
  }else if(type==='fail'){
    el.className='puzzle__feedback retry';
    el.innerHTML='<div class="result">\u2717 That\'s not it</div><div class="instruction">Try something else.</div><div class="actions"><a onclick="pzHint()">GET A HINT</a><a onclick="pzSolution()">VIEW THE SOLUTION</a></div>';
  }
}
function pzHint(){if(!curPz||pzDone)return;sel=curPz.sol[pzIdx].slice(0,2);drawPuzzle()}
function pzSolution(){if(!curPz)return;pzDone=true;let i=pzIdx;(function go(){if(i>=curPz.sol.length){showPrompt('success');return}const m=curPz.sol[i];chess.move({from:m.slice(0,2),to:m.slice(2,4),promotion:m.length>4?m[4]:undefined});lastMv={from:m.slice(0,2),to:m.slice(2,4)};i++;drawPuzzle();setTimeout(go,500)})()}
function renderMoves(){
  const el=document.getElementById('movesList');
  const h=chess.history();
  let html='<table>';
  for(let i=0;i<h.length;i+=2){
    html+='<tr><td class="index">'+(Math.floor(i/2)+1)+'</td><td class="move'+(i===h.length-1?' active':'')+'">'+(h[i]||'')+'</td><td class="move'+(i+1===h.length-1?' active':'')+'">'+(h[i+1]||'')+'</td></tr>';
  }
  el.innerHTML=html+'</table>';el.scrollTop=el.scrollHeight;
}

// === PLAY ===
const PV={p:100,n:320,b:330,r:500,q:900,k:20000};
const PST={p:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],n:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],b:[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,10,10,10,10,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],r:[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],q:[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],k:[-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20]};
function evl(c){const b=c.board();let s=0;for(let r=0;r<8;r++)for(let l=0;l<8;l++){const p=b[r][l];if(!p)continue;const v=PV[p.type]||0;const i=p.color==='w'?r*8+l:(7-r)*8+l;const t=PST[p.type]?PST[p.type][i]:0;s+=p.color==='w'?v+t:-(v+t)}return c.turn()==='w'?s:-s}
function mmx(c,d,a,b,m){if(d===0||c.game_over()){if(c.in_checkmate())return m?-99999:99999;if(c.in_draw())return 0;return evl(c)}const ms=c.moves({verbose:true}).sort((a,b)=>(b.captured?PV[b.captured]:0)-(a.captured?PV[a.captured]:0));if(m){let v=-Infinity;for(const x of ms){c.move(x);const e=mmx(c,d-1,a,b,false);c.undo();v=Math.max(v,e);a=Math.max(a,e);if(b<=a)break}return v}else{let v=Infinity;for(const x of ms){c.move(x);const e=mmx(c,d-1,a,b,true);c.undo();v=Math.min(v,e);b=Math.min(b,e);if(b<=a)break}return v}}
function getBest(c,l){const ms=c.moves({verbose:true});if(!ms.length)return null;if(l===1)return ms[Math.floor(Math.random()*ms.length)];const dp=Math.min(l-1,3);let bm=ms[0],bv=-Infinity;for(const m of ms){c.move(m);const v=-mmx(c,dp-1,-Infinity,Infinity,false)+(l<=2?(Math.random()-.5)*100:0);c.undo();if(v>bv){bv=v;bm=m}}return bm}

function newGame(){pCol=document.getElementById('gcol').value;eLvl=parseInt(document.getElementById('glvl').value);gChess=new Chess();gOn=true;sel=null;lastMv=null;drawGame();updGS();if(pCol==='b')setTimeout(engMv,400)}
function drawGame(){drawBoard('gboard',gChess,pCol==='b',gOn&&gChess.turn()===pCol,onGSq);document.getElementById('gmoves').innerHTML=fmtH()}
function onGSq(sq){if(!gOn||gChess.turn()!==pCol)return;if(sel){const ms=gChess.moves({square:sel,verbose:true});const m=ms.find(x=>x.to===sq);if(m){if(m.flags.includes('p')){showPromo(sel,sq,gChess.turn(),'g');return}doGMv(sel,sq)}else{const pc=gChess.get(sq);sel=pc&&pc.color===pCol?sq:null;drawGame()}}else{const pc=gChess.get(sq);if(pc&&pc.color===pCol)sel=sq;drawGame()}}
function doGMv(f,t,p){gChess.move({from:f,to:t,promotion:p});lastMv={from:f,to:t};sel=null;drawGame();updGS();if(gChess.game_over()){endG();return}setTimeout(engMv,300)}
function engMv(){if(!gOn||gChess.game_over())return;const m=getBest(gChess,eLvl);if(m){gChess.move(m);lastMv={from:m.from,to:m.to};drawGame();updGS();if(gChess.game_over())endG()}}
function updGS(){const e=document.getElementById('gstatus');if(!gChess)return;if(gChess.in_checkmate())e.textContent=(gChess.turn()==='w'?'Black':'White')+' wins!';else if(gChess.in_draw()||gChess.in_stalemate())e.textContent='Draw!';else if(gChess.in_check())e.textContent=(gChess.turn()===pCol?'You are':'Engine is')+' in check!';else e.textContent=gChess.turn()===pCol?'Your turn':'Engine thinking...'}
function fmtH(){if(!gChess)return'';const h=gChess.history();let s='';for(let i=0;i<h.length;i+=2)s+=(Math.floor(i/2)+1)+'. '+h[i]+' '+(h[i+1]||'')+' ';return s||'No moves yet'}
function endG(){gOn=false;st.g++;if(gChess.in_checkmate()&&gChess.turn()!==pCol)st.w++;saveSt();drawGame()}

function showPromo(f,t,col,ctx){const ov=document.createElement('div');ov.className='promo-overlay';const bx=document.createElement('div');bx.className='promo-choices';['q','r','b','n'].forEach(p=>{const o=document.createElement('div');o.className='promo-choice';o.style.backgroundImage='url("'+PIECE_SVG[(col==='w'?'w':'b')+p.toUpperCase()]+'")';o.onclick=()=>{document.body.removeChild(ov);if(ctx==='pz')doPzMove(f,t,p);else doGMv(f,t,p)};bx.appendChild(o)});ov.appendChild(bx);ov.onclick=e=>{if(e.target===ov){document.body.removeChild(ov);sel=null;if(ctx==='pz')drawPuzzle();else drawGame()}};document.body.appendChild(ov)}

function updStats(){const a=st.a>0?Math.round(st.s/st.a*100):0;document.getElementById('xS').textContent=st.s;document.getElementById('xA').textContent=a+'%';document.getElementById('xK').textContent=st.k;document.getElementById('xG').textContent=st.g}
function saveSt(){localStorage.setItem('sgm3',JSON.stringify(st))}

newPuzzle();
</script>
